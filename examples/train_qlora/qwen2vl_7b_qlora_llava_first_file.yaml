### llamafactory-cli train examples/train_qlora/qwen2vl_7b_qlora_llava_first_file.yaml
report_to: wandb
run_name: qwen2vl_7b_llava_demodata_cosine_lr_all_lora_2_05052025

### model
model_name_or_path: /data/model/Qwen/Qwen2-VL-7B-Instruct
quantization_bit: 4
quantization_method: bitsandbytes  # choices: [bitsandbytes (4/8), hqq (2/3/4/5/6/8), eetq (8)]

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all # q_proj, v_proj
deepspeed: examples/deepspeed/ds_z2_offload_config.json

### dataset
dataset: llava_demo_first_2ks
template: qwen2_vl
cutoff_len: 2048
max_samples: 200000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: /data/test/lora-models/qwen2vl_7b_llava_demodata_cosine_lr_all_lora_2_27042025
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 32
learning_rate: 1.0e-5
num_train_epochs: 20
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
save_total_limit: 3

### eval
val_size: 0.01
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
